name: Deploy to ECS (prod)

on:
  push:
    branches: ["main"]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER: day-one-prod
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push mysql
        run: |
          docker build -t $ECR_REGISTRY/day-one-prod/mysql:$IMAGE_TAG \
            -t $ECR_REGISTRY/day-one-prod/mysql:latest \
            -f ./Dockerfile.mysql ./
          docker push $ECR_REGISTRY/day-one-prod/mysql:$IMAGE_TAG
          docker push $ECR_REGISTRY/day-one-prod/mysql:latest

      - name: Build and push backend
        run: |
          docker build -t $ECR_REGISTRY/day-one-prod/backend:$IMAGE_TAG \
            -t $ECR_REGISTRY/day-one-prod/backend:latest \
            -f ./Dockerfile.backend ./
          docker push $ECR_REGISTRY/day-one-prod/backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/day-one-prod/backend:latest

      - name: Build and push frontend
        run: |
          docker build -t $ECR_REGISTRY/day-one-prod/frontend:$IMAGE_TAG \
            -t $ECR_REGISTRY/day-one-prod/frontend:latest \
            --build-arg NGINX_CONF=nginx.prod.conf \
            -f ./Dockerfile.frontend ./
          docker push $ECR_REGISTRY/day-one-prod/frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/day-one-prod/frontend:latest

      - name: Update ECS task definition and deploy
        run: |
          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition --task-definition day-one-prod-app --query taskDefinition)

          # Replace image tags with new commit hash
          NEW_TASK_DEF=$(echo "$TASK_DEF" | \
            sed "s|day-one-prod/mysql:[a-zA-Z0-9]*|day-one-prod/mysql:$IMAGE_TAG|g" | \
            sed "s|day-one-prod/backend:[a-zA-Z0-9]*|day-one-prod/backend:$IMAGE_TAG|g" | \
            sed "s|day-one-prod/frontend:[a-zA-Z0-9]*|day-one-prod/frontend:$IMAGE_TAG|g")

          # Register new task definition
          echo "$NEW_TASK_DEF" | jq '{
            family: .family,
            networkMode: .networkMode,
            containerDefinitions: .containerDefinitions,
            volumes: .volumes,
            requiresCompatibilities: .requiresCompatibilities,
            executionRoleArn: .executionRoleArn,
            taskRoleArn: .taskRoleArn
          } | with_entries(select(.value != null))' > /tmp/taskdef.json

          NEW_ARN=$(aws ecs register-task-definition --cli-input-json file:///tmp/taskdef.json --query taskDefinition.taskDefinitionArn --output text)

          # Update service with new task definition
          aws ecs update-service --cluster $ECS_CLUSTER --service app \
            --task-definition "$NEW_ARN" \
            --force-new-deployment --no-cli-pager > /dev/null

          echo "DEPLOY OK: $IMAGE_TAG"
