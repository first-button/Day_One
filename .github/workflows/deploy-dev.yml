name: Deploy to EC2 (develop)

on:
  push:
    branches: ["develop"]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 084375578827.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        run: |
          docker build -f Dockerfile.backend -t ${{ env.ECR_REGISTRY }}/day-one-dev/backend:latest .
          docker push ${{ env.ECR_REGISTRY }}/day-one-dev/backend:latest

      - name: Build and push frontend
        run: |
          docker build -f Dockerfile.frontend -t ${{ env.ECR_REGISTRY }}/day-one-dev/frontend:latest .
          docker push ${{ env.ECR_REGISTRY }}/day-one-dev/frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP_DIR="${{ secrets.EC2_APP_DIR }}"
            INFRA_DIR="${{ secrets.EC2_APP_DIR }}_cloud"

            # First time: init app repo
            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              cd "$APP_DIR"
              git init
              git remote add origin https://github.com/first-button/Day_One.git
              git fetch origin develop
              git checkout -b develop origin/develop
            fi

            # First time: init infra repo
            if [ ! -d "$INFRA_DIR/.git" ]; then
              mkdir -p "$INFRA_DIR"
              cd "$INFRA_DIR"
              git init
              git remote add origin https://github.com/first-button/Day_One_Cloud.git
              git fetch origin main
              git checkout -b main origin/main
            fi

            cd "$APP_DIR"
            git fetch origin develop
            git reset --hard origin/develop

            cd "$INFRA_DIR"
            git fetch origin main
            git reset --hard origin/main

            # Login to ECR
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 084375578827.dkr.ecr.us-east-1.amazonaws.com

            # Pull and deploy using infra configs
            cd "$INFRA_DIR/environments/dev"
            ln -sf "$APP_DIR/.env" .env
            export APP_DIR
            export ECR_REGISTRY=084375578827.dkr.ecr.us-east-1.amazonaws.com
            docker compose pull backend frontend
            docker compose up -d --force-recreate

            # Verify
            sleep 10
            docker compose ps

            echo "DEPLOY OK: $(cd $APP_DIR && git rev-parse --short HEAD)"

  notify:
    needs: [build-and-push, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            COLOR=3066993
            TITLE="Deploy Succeeded"
            DESC="**Branch:** develop\n**Commit:** \`${GITHUB_SHA::7}\`\n**By:** ${{ github.actor }}"
          elif [ "${{ needs.build-and-push.result }}" = "failure" ]; then
            COLOR=15158332
            TITLE="Build Failed"
            DESC="**Branch:** develop\n**Commit:** \`${GITHUB_SHA::7}\`\n**By:** ${{ github.actor }}\n**Stage:** Docker build/push\n[View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          else
            COLOR=15158332
            TITLE="Deploy Failed"
            DESC="**Branch:** develop\n**Commit:** \`${GITHUB_SHA::7}\`\n**By:** ${{ github.actor }}\n**Stage:** EC2 deploy\n[View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          fi

          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"$TITLE\",\"description\":\"$DESC\",\"color\":$COLOR}]}" \
            "$DISCORD_WEBHOOK"
